name = "hammy-coach"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Non-secret configuration (safe to commit). Change to your values.
[vars]
OPENAI_MODEL = "gpt-4.1-mini"
ALLOWED_ORIGINS = "https://jackblaze919.github.io,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173"
# VAPID *public* key is not a secret (the browser needs it). Set after `wrangler deploy` via the
# value printed by the key-generation step (see README). Leave empty until then.
VAPID_PUBLIC_KEY = "BJSk88gZG9sxfWs74ggR0Oa37qhtwBtDBCJnCX4Ly8VHi49ZBhrHZfL0OwKFmbIdyKNER5v708Nee21cgToxhbs"
VAPID_SUBJECT = "https://jackblaze919.github.io/isa-tracker/"
# Fitness-day cutoff hour (tracker day runs from this local hour to 1 minute before it next day).
# Reminder status dedupe + the future email digest use this. Keep in sync with the frontend (4).
TRACKER_DAY_CUTOFF_HOUR = "4"

# Hammy reminders: Cloudflare D1 database binding. Create the DB, then paste its id here
# (see README "Reminders one-time setup"). Until this exists, reminder routes return 503.
[[d1_databases]]
binding = "REMINDERS_DB"
database_name = "hammy-reminders"
database_id = "06a594a1-0cfe-4950-aec8-e4197e546c88"

# Cron: run the reminder scheduler about every 15 minutes.
[triggers]
crons = ["*/15 * * * *"]

# SECRETS — never put in this file. Set them with:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put COACH_ACCESS_CODE
#   wrangler secret put SESSION_SIGNING_SECRET
#   wrangler secret put VAPID_PRIVATE_KEY
# For local dev, copy .dev.vars.example -> .dev.vars (gitignored) and fill it in.
