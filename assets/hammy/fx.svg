<svg xmlns="http://www.w3.org/2000/svg">

<!-- Effect: Heart 1 — filled pink heart -->
<symbol id="fx-heart-1" viewBox="0 0 24 24">
  <path d="M12 20 C12 20 4 14 4 9 C4 6 6 4 9 4 C10.5 4 12 5 12 6.5 C12 5 13.5 4 15 4 C18 4 20 6 20 9 C20 14 12 20 12 20Z" fill="#ff8fb0" stroke="#7a5030" stroke-width="0.8"/>
  <!-- Shadow -->
  <path d="M12 20 C12 20 6 15 5 11 C7 15 12 18 12 18Z" fill="#e06080" opacity="0.4"/>
  <!-- Highlight -->
  <circle cx="8" cy="8" r="1.5" fill="#ffb8d0" opacity="0.7"/>
</symbol>

<!-- Effect: Heart 2 — rounded coral heart -->
<symbol id="fx-heart-2" viewBox="0 0 24 24">
  <path d="M12 19 C12 19 5 14 5 9.5 C5 7 7 5 9.5 5 C10.8 5 12 6 12 7 C12 6 13.2 5 14.5 5 C17 5 19 7 19 9.5 C19 14 12 19 12 19Z" fill="#ff9080" stroke="#7a5030" stroke-width="0.8"/>
  <!-- Shadow -->
  <path d="M12 19 C12 19 7 15 6 11 C8 14 12 17 12 17Z" fill="#d06050" opacity="0.3"/>
  <!-- Highlight -->
  <ellipse cx="9" cy="8" rx="1.2" ry="1" fill="#ffc0b0" opacity="0.6"/>
</symbol>

<!-- Effect: Heart 3 — small sparkly heart with highlight dot -->
<symbol id="fx-heart-3" viewBox="0 0 24 24">
  <path d="M12 18 C12 18 6 13 6 10 C6 8 7.5 6.5 9.5 6.5 C10.5 6.5 12 7.5 12 8 C12 7.5 13.5 6.5 14.5 6.5 C16.5 6.5 18 8 18 10 C18 13 12 18 12 18Z" fill="#ff8fb0" stroke="#7a5030" stroke-width="0.7"/>
  <!-- Shadow -->
  <path d="M10 14 Q12 16 12 16 Q9 13 8 11Z" fill="#e06080" opacity="0.3"/>
  <!-- Sparkle highlight dot -->
  <circle cx="9" cy="9" r="1" fill="#ffffff" opacity="0.8"/>
  <!-- Tiny sparkle rays -->
  <g stroke="#ffb8d0" stroke-width="0.5" opacity="0.7">
    <line x1="9" y1="7.5" x2="9" y2="6.5"/>
    <line x1="7.5" y1="9" x2="6.5" y2="9"/>
  </g>
</symbol>

<!-- Effect: Star 1 — rounded 5-point star -->
<symbol id="fx-star-1" viewBox="0 0 24 24">
  <path d="M12 3 L14.2 9 L20.5 9.5 L15.5 13.5 L17 20 L12 16.5 L7 20 L8.5 13.5 L3.5 9.5 L9.8 9Z" fill="#ffd060" stroke="#7a5030" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Shadow/depth on lower portion -->
  <path d="M12 16.5 L7 20 L8.5 13.5 L3.5 9.5 L9.8 9 L12 3" fill="#e0a030" opacity="0.25"/>
  <!-- Highlight -->
  <circle cx="10" cy="9" r="1.2" fill="#ffe890" opacity="0.7"/>
</symbol>

<!-- Effect: Star 2 — small 4-point sparkle -->
<symbol id="fx-star-2" viewBox="0 0 24 24">
  <path d="M12 4 L13.5 10.5 L20 12 L13.5 13.5 L12 20 L10.5 13.5 L4 12 L10.5 10.5Z" fill="#ffd060" stroke="#7a5030" stroke-width="0.6" stroke-linejoin="round"/>
  <!-- Highlight center -->
  <circle cx="12" cy="12" r="1.5" fill="#ffe890" opacity="0.6"/>
</symbol>

<!-- Effect: Sparkle — tiny cross/diamond shape -->
<symbol id="fx-sparkle" viewBox="0 0 24 24">
  <path d="M12 6 L13 11 L18 12 L13 13 L12 18 L11 13 L6 12 L11 11Z" fill="#ffffff" stroke="#e0a030" stroke-width="0.4"/>
  <!-- Warm gold tint -->
  <path d="M12 8 L12.5 11.5 L16 12 L12.5 12.5 L12 16 L11.5 12.5 L8 12 L11.5 11.5Z" fill="#ffd060" opacity="0.3"/>
</symbol>

<!-- Effect: ZZZ — bubbly sleep Z -->
<symbol id="fx-zzz" viewBox="0 0 24 24">
  <path d="M7 8 Q7 6 9 6 L17 6 Q18 6 18 7 L10 14 Q9 15 10 15 L18 15 Q19 15 19 17 Q19 18 17 18 L9 18 Q7 18 7 17 L15 10 Q16 9 15 9 L7 9 Q6 9 7 8Z" fill="#c0a0d8" stroke="#7a5030" stroke-width="0.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Highlight -->
  <path d="M9 7 L15 7" fill="none" stroke="#d8c0e8" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
</symbol>

<!-- Effect: Dust 1 — small puff cloud -->
<symbol id="fx-dust-1" viewBox="0 0 24 24">
  <g opacity="0.7">
    <ellipse cx="12" cy="14" rx="6" ry="4" fill="#e0d0b8"/>
    <ellipse cx="9" cy="12" rx="4" ry="3.5" fill="#e8d8c8"/>
    <ellipse cx="15" cy="12" rx="4" ry="3" fill="#e8d8c8"/>
    <ellipse cx="12" cy="10" rx="3.5" ry="3" fill="#f0e8d8"/>
  </g>
  <g fill="none" stroke="#7a5030" stroke-width="0.4" opacity="0.4">
    <ellipse cx="12" cy="12" rx="7" ry="5"/>
  </g>
</symbol>

<!-- Effect: Dust 2 — slightly different lighter puff -->
<symbol id="fx-dust-2" viewBox="0 0 24 24">
  <g opacity="0.6">
    <ellipse cx="12" cy="13" rx="5" ry="3.5" fill="#f0e4d0"/>
    <ellipse cx="10" cy="11" rx="3.5" ry="3" fill="#f5ece0"/>
    <ellipse cx="14" cy="11" rx="3" ry="2.5" fill="#f5ece0"/>
    <ellipse cx="12" cy="9" rx="2.5" ry="2.5" fill="#faf4ea"/>
  </g>
  <g fill="none" stroke="#7a5030" stroke-width="0.3" opacity="0.3">
    <ellipse cx="12" cy="11" rx="6" ry="4.5"/>
  </g>
</symbol>

<!-- Effect: Crumb 1 — tiny seed/crumb shape -->
<symbol id="fx-crumb-1" viewBox="0 0 24 24">
  <ellipse cx="12" cy="12" rx="3" ry="2" fill="#b89060" stroke="#7a5030" stroke-width="0.6" transform="rotate(-15 12 12)"/>
  <!-- Highlight -->
  <ellipse cx="11" cy="11" rx="1" ry="0.7" fill="#d4a870" opacity="0.6" transform="rotate(-15 11 11)"/>
  <!-- Shadow -->
  <ellipse cx="13" cy="13" rx="1.5" ry="0.8" fill="#8a6040" opacity="0.3" transform="rotate(-15 13 13)"/>
</symbol>

<!-- Effect: Crumb 2 — different crumb, slightly lighter -->
<symbol id="fx-crumb-2" viewBox="0 0 24 24">
  <ellipse cx="12" cy="12" rx="2.5" ry="1.8" fill="#c8a070" stroke="#7a5030" stroke-width="0.5" transform="rotate(20 12 12)"/>
  <!-- Highlight -->
  <ellipse cx="11.5" cy="11.5" rx="0.8" ry="0.6" fill="#e0c090" opacity="0.6" transform="rotate(20 11.5 11.5)"/>
  <!-- Shadow -->
  <ellipse cx="12.5" cy="12.8" rx="1.2" ry="0.7" fill="#9a7050" opacity="0.25" transform="rotate(20 12.5 12.8)"/>
</symbol>

</svg>
